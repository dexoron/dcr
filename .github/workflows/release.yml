  # ── Arch User Repository (dcr-dev) ────────────────────────────────
  publish-aur-dev:
    if: ${{ (github.event_name == 'push' && needs.setup.outputs.prerelease == 'true') || github.event.inputs.run_aur_dev == 'true' }}
    needs: [setup]
    runs-on: ubuntu-latest
    environment: aur
    steps:
