  # ── Arch User Repository (dcr-bin) ────────────────────────────────
  publish-aur-bin:
    if: ${{ (github.event_name == 'push' && needs.setup.outputs.prerelease == 'false') || github.event.inputs.run_aur == 'true' }}
    needs: [setup, build-linux]
